<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פיצה מאמא</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900">

    <!-- Header -->
    <header class="bg-white shadow-md p-4 flex justify-between items-center">
        <div class="text-2xl font-bold text-red-500">פיצה מאמא</div>
        <a href="tel:03-5554321" class="bg-red-500 text-white px-4 py-2 rounded-full hover:bg-red-600 transition duration-300">חיוג מהיר</a>
    </header>

    <!-- Hero Section -->
    <section class="relative bg-cover bg-center h-screen flex items-center justify-center" style="background-image: url('https://source.unsplash.com/1600x900/?pizza');">
        <div class="bg-black bg-opacity-50 p-8 rounded-lg text-center">
            <h1 class="text-white text-4xl md:text-6xl font-bold mb-4">הפיצה שתמיד חלמת עליה</h1>
            <p class="text-white text-lg md:text-xl">טרייה, חמה וטעימה במקום אחד</p>
        </div>
    </section>

    <!-- Services/Benefits -->
    <section class="py-16 px-8">
        <h2 class="text-3xl text-center font-bold mb-12">מה אנו מציעים</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white shadow-lg rounded-lg p-6 text-center">
                <h3 class="text-xl font-bold mb-4">פיצות מיוחדות</h3>
                <p>מגוון פיצות עם מרכיבים איכותיים וטריים</p>
            </div>
            <div class="bg-white shadow-lg rounded-lg p-6 text-center">
                <h3 class="text-xl font-bold mb-4">משלוחים מהירים</h3>
                <p>הפיצה אצלכם בזריזות ובחום</p>
            </div>
            <div class="bg-white shadow-lg rounded-lg p-6 text-center">
                <h3 class="text-xl font-bold mb-4">אווירה משפחתית</h3>
                <p>בואו להנות מאווירה חמה ונעימה</p>
            </div>
        </div>
    </section>

    <!-- Call to Action -->
    <section class="bg-red-500 py-8 text-center">
        <h2 class="text-white text-2xl font-bold mb-4">הזמינו פיצה עכשיו!</h2>
        <a href="tel:03-5554321" class="bg-white text-red-500 px-6 py-3 rounded-full font-bold hover:bg-gray-100 transition duration-300">לחיוג מהיר</a>
    </section>

</body>
</html>
