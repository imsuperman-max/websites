<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הובלות משה ובניו</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Heebo', sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: #f4f4f4;
        }
        nav {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 1em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav button {
            background-color: #e74c3c;
            border: none;
            padding: 0.5em 1em;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        nav button:hover {
            background-color: #c0392b;
        }
        .hero {
            background-color: #34495e;
            color: #ecf0f1;
            text-align: center;
            padding: 5em 1em;
        }
        .hero h1 {
            font-size: 2.5em;
            margin: 0;
        }
        .hero p {
            font-size: 1.2em;
        }
        .hero button {
            background-color: #e74c3c;
            border: none;
            padding: 0.7em 1.5em;
            color: #fff;
            cursor: pointer;
            margin-top: 1em;
            transition: background-color 0.3s;
        }
        .hero button:hover {
            background-color: #c0392b;
        }
        .services, .why-us {
            padding: 2em 1em;
            text-align: center;
        }
        .services h2, .why-us h2 {
            margin-bottom: 1em;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1em;
        }
        .card {
            background-color: #fff;
            padding: 1em;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .contact {
            background-color: #ecf0f1;
            padding: 2em 1em;
            text-align: center;
        }
        .contact button {
            background-color: #2ecc71;
            border: none;
            padding: 0.7em 1.5em;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .contact button:hover {
            background-color: #27ae60;
        }
        footer {
            background-color: #2c3e50;
            color: #ecf0f1;
            text-align: center;
            padding: 1em;
        }
    </style>
</head>
<body>
    <nav>
        <div>הובלות משה ובניו</div>
        <button onclick="window.location.href='tel:+972502469499'">התקשר</button>
    </nav>
    <div class="hero">
        <h1>הובלות משה ובניו</h1>
        <p>שירות מהיר ומקצועי לכל מטרה</p>
        <button>לפרטים נוספים</button>
    </div>
    <section class="services">
        <h2>השירותים שלנו</h2>
        <div class="grid">
            <div class="card">הובלות דירות</div>
            <div class="card">הובלות משרדים</div>
            <div class="card">שירותי אחסנה</div>
            <div class="card">שירותי אריזה</div>
        </div>
    </section>
    <section class="why-us">
        <h2>למה אנחנו?</h2>
        <div class="grid">
            <div class="card">מקצועיות ללא פשרות</div>
            <div class="card">שירות מהיר ואמין</div>
            <div class="card">מחירים תחרותיים</div>
            <div class="card">צוות מנוסה ומיומן</div>
        </div>
    </section>
    <section class="contact">
        <h2>צור קשר</h2>
        <p>טלפון: <strong>+972 50-246-9499</strong></p>
        <button onclick="window.location.href='https://wa.me/+972502469499'">WhatsApp</button>
    </section>
    <footer>
        <p>© 2023 הובלות משה ובניו. כל הזכויות שמורות.</p>
    </footer>
</body>
</html>
